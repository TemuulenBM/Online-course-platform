## Render Infrastructure as Code
## Нэн чухал: доорх sync: false vars-уудыг Render dashboard-д manually оруулна
## https://dashboard.render.com → Service → Environment

services:
  - type: web
    name: ocp-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1
    envVars:
      ## Үндсэн тохиргоо
      - key: NODE_ENV
        value: production
      - key: APP_PORT
        value: "3001"
      - key: CHROMIUM_PATH
        value: /usr/bin/chromium-browser

      ## Storage — Cloudflare R2
      - key: STORAGE_PROVIDER
        value: r2

      ## Redis TLS — Upstash шаарддаг
      - key: REDIS_TLS
        value: "true"

      ## JWT — Render автоматаар үүсгэнэ
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d

      ## Доорхыг Render dashboard-д MANUALLY тохируулна:

      ## PostgreSQL (Neon) — https://neon.tech
      ## Формат: postgresql://user:pass@host.neon.tech/dbname?sslmode=require
      - key: DATABASE_URL
        sync: false

      ## MongoDB Atlas (M0 Free) — https://cloud.mongodb.com
      ## Формат: mongodb+srv://user:pass@cluster.mongodb.net/online_course_platform
      - key: MONGODB_URI
        sync: false

      ## Redis (Upstash) — https://upstash.com → Database → Details
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false

      ## CORS — Vercel URL болон localhost
      ## Жишээ: https://myapp.vercel.app,http://localhost:3000
      - key: APP_URL
        sync: false

      ## Cloudflare R2 — https://dash.cloudflare.com → R2 → Bucket → API
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      ## R2 Public URL — https://pub-xxx.r2.dev эсвэл custom domain
      - key: R2_PUBLIC_URL
        sync: false

      ## Notification (optional — хоосон үлдэж болно)
      - key: SENDGRID_API_KEY
        sync: false
